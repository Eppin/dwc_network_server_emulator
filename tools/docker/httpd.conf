ServerRoot "/opt/httpd"
Define APACHE_LOG_DIR "/opt/httpd/logs"

ServerName localhost
Listen 80
Listen 443

User daemon
Group daemon

PidFile /opt/httpd/logs/httpd.pid
ErrorLog /dev/stderr

# Temporary handshake/proxy debug logging.
LogLevel warn ssl:info proxy:trace3 proxy_http:trace3
CustomLog /dev/stdout "%h %l %u %t \"%r\" %>s %b host=\"%{Host}i\" proto=%{SSL_PROTOCOL}x cipher=%{SSL_CIPHER}x"

LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule socache_shmcb_module modules/mod_socache_shmcb.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

ServerTokens Prod
ServerSignature Off
ProxyRequests Off
ProxyPreserveHost On

SSLProtocol -all +SSLv3
SSLCipherSuite ALL
SSLHonorCipherOrder on
SSLSessionCache shmcb:/opt/httpd/logs/ssl_scache(512000)
SSLSessionCacheTimeout 300
SSLOptions +StdEnvVars +ExportCertData

TypesConfig conf/mime.types
DocumentRoot "/opt/httpd/htdocs"

<Directory "/opt/httpd/htdocs">
    Require all granted
</Directory>

IncludeOptional conf/extra/vhosts/*.conf