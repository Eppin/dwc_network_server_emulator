<VirtualHost *:80>
        ServerAdmin webmaster@localhost
        ServerName sake.gs.nintendowifi.net
        ServerAlias sake.gs.nintendowifi.net *.sake.gs.nintendowifi.net
        ServerAlias secure.sake.gs.nintendowifi.net
        ServerAlias secure.sake.gs.nintendowifi.net *.secure.sake.gs.nintendowifi.net
 
        ProxyPass / http://dwc_backend:8000/
        ProxyPassReverse / http://dwc_backend:8000/
 
        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

<VirtualHost *:443>
        ServerAdmin webmaster@localhost
        ServerName sake.gs.nintendowifi.net
        ServerAlias sake.gs.nintendowifi.net *.sake.gs.nintendowifi.net
        ServerAlias secure.sake.gs.nintendowifi.net
        ServerAlias secure.sake.gs.nintendowifi.net *.secure.sake.gs.nintendowifi.net

        SSLEngine on
        SSLCertificateFile "/opt/httpd/conf/server.crt"
        SSLCertificateKeyFile "/opt/httpd/conf/server.key"
        SSLCertificateChainFile "/opt/httpd/conf/nwc.crt"
        
        ProxyPass / http://dwc_backend:8000/

        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
