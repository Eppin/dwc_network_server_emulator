<VirtualHost *:80>
        ServerAdmin webmaster@localhost
        ServerName gamestats2.gs.nintendowifi.net
        ServerAlias "gamestats2.gs.nintendowifi.net, gamestats2.gs.nintendowifi.net"
 
        ProxyPreserveHost On
 
        ProxyPass / http://dwc_backend:9002/
        ProxyPassReverse / http://dwc_backend:9002/
</VirtualHost>

<VirtualHost *:443>
        ServerAdmin webmaster@localhost
        ServerName gamestats2.gs.nintendowifi.net
        ServerAlias "gamestats2.gs.nintendowifi.net, gamestats2.gs.nintendowifi.net"

        ProxyPreserveHost On
        SSLEngine on
        SSLCertificateFile "/opt/httpd/conf/server.crt"
        SSLCertificateKeyFile "/opt/httpd/conf/server.key"
        SSLCertificateChainFile "/opt/httpd/conf/nwc.crt"

        ProxyPass / http://dwc_backend:9002/
        ProxyPassReverse / http://dwc_backend:9002/
</VirtualHost>
