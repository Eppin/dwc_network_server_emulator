<VirtualHost *:80>
        ServerAdmin webmaster@localhost
        ServerName dls1.nintendowifi.net
        ServerAlias "dls1.nintendowifi.net"
        ServerAlias "dls1.nintendowifi.net, dls1.nintendowifi.net"
        
        ProxyPreserveHost On
        ProxyPass / http://dwc_backend:9003/
        ProxyPassReverse / http://dwc_backend:9003/
</VirtualHost>

<VirtualHost *:443>
        ServerAdmin webmaster@localhost
        ServerName dls1.nintendowifi.net
        ServerAlias "dls1.nintendowifi.net"
        ServerAlias "dls1.nintendowifi.net, dls1.nintendowifi.net"

        SSLEngine on
        SSLCertificateFile "/opt/httpd/conf/server.crt"
        SSLCertificateKeyFile "/opt/httpd/conf/server.key"
        SSLCertificateChainFile "/opt/httpd/conf/nwc.crt"

        ProxyPreserveHost On
        ProxyPass / http://dwc_backend:9003/
        ProxyPassReverse / http://dwc_backend:9003/
</VirtualHost>
