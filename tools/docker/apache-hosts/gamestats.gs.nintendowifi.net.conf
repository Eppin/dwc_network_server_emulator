<VirtualHost *:80>
        ServerAdmin webmaster@localhost
        ServerName gamestats.gs.nintendowifi.net
        ServerAlias "gamestats.gs.nintendowifi.net, gamestats.gs.nintendowifi.net"
        
        ProxyPreserveHost On
        ProxyPass / http://dwc_backend:9002/
        ProxyPassReverse / http://dwc_backend:9002/
</VirtualHost>

<VirtualHost *:443>
        ServerAdmin webmaster@localhost
        ServerName gamestats.gs.nintendowifi.net
        ServerAlias "gamestats.gs.nintendowifi.net, gamestats.gs.nintendowifi.net"
        
        SSLEngine on
        SSLCertificateFile "/opt/httpd/conf/server.crt"
        SSLCertificateKeyFile "/opt/httpd/conf/server.key"
        SSLCertificateChainFile "/opt/httpd/conf/nwc.crt"

        ProxyPreserveHost On
        ProxyPass / http://dwc_backend:9002/
        ProxyPassReverse / http://dwc_backend:9002/
</VirtualHost>
